version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"
    restart: always

  api:
    build: .
    container_name: employee-api
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - JwtConfig__Key=${JWT_KEY}
      - JwtConfig__Issuer=http://localhost:5039
      - JwtConfig__Audience=http://localhost:5039
      - EmailSettings__Host=${EMAIL_HOST}
      - EmailSettings__Email=${EMAIL_USER}
      - EmailSettings__Password=${EMAIL_PASS}
      - EmailSettings__Port=${EMAIL_PORT}
    ports:
      - "5000:80"